name: Full Suite

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * 5'  # weekly Friday

jobs:
  full-suite:
    runs-on: windows-latest
    timeout-minutes: 480
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build
        shell: bash
        run: |
          go build -o pkg/shim/shim.exe ./internal/shimbinary/
          go build -ldflags="-X 'github.com/scoopinstaller/scoop-go/cmd/scoop/cmd.BuildDate=$(date -u +%Y-%m-%d)' -X 'github.com/scoopinstaller/scoop-go/cmd/scoop/cmd.Version=full-suite'" -o scoop-go.exe ./cmd/scoop/

      - name: Clone main bucket
        shell: bash
        run: |
          mkdir -p ~/scoop/buckets
          git clone --depth 1 --single-branch --no-tags https://github.com/ScoopInstaller/Main.git ~/scoop/buckets/main 2>&1 | tail -2
          echo "main: $(ls ~/scoop/buckets/main/bucket/*.json 2>/dev/null | wc -l) manifests"

      - name: Create results dir
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path results | Out-Null

      - name: Run all
        shell: pwsh
        run: |
          $scoop = ".\scoop-go.exe"
          $manifests = Get-ChildItem "$env:USERPROFILE\scoop\buckets\main\bucket\*.json" | Sort-Object Name
          $total = $manifests.Count
          $passed = 0; $failed = 0; $skipped = 0
          "Total manifests: $total" | Out-File results\summary.log

          foreach ($mf in $manifests) {
            $app = $mf.BaseName
            $log = "results\$app.log"
            $done = "results\_done.log"

            "=== $app ===" | Out-File $log
            "$(Get-Date -Format HH:mm:ss) Installing $app..." | Out-File $log -Append

            $output = & $scoop install $app 2>&1 | Out-String
            if ($LASTEXITCODE -eq 0) {
              "PASS: $app installed" | Out-File $log -Append
              & $scoop uninstall $app 2>&1 | Out-Null
              "PASS: $app" | Out-File done -Append
              "PASS: $app" | Out-File results\summary.log -Append
              $passed++
              Write-Host "PASS $passed/$total: $app" -ForegroundColor Green
            } else {
              $err = ($output -split "`n" | Where-Object { $_ -match "Error:|ERROR" }) -join "; "
              "FAIL: $app - $err" | Out-File $log -Append
              $output | Out-File $log -Append
              "FAIL: $app" | Out-File results\summary.log -Append
              $failed++
              Write-Host "FAIL $failed/$total: $app" -ForegroundColor Red
              Remove-Item -Recurse -Force "$env:USERPROFILE\scoop\apps\$app" -ErrorAction SilentlyContinue
              Remove-Item "$env:USERPROFILE\scoop\cache\$app*" -ErrorAction SilentlyContinue
            }
          }

          "========================================" | Out-File results\summary.log -Append
          "Results: Total=$total Passed=$passed Failed=$failed" | Out-File results\summary.log -Append

          Write-Host "`n========================================" -ForegroundColor Cyan
          Write-Host "Results: Total=$total Passed=$passed Failed=$failed" -ForegroundColor $(if ($failed -eq 0) {"Green"} else {"Red"})

          if ($failed -gt 0) {
            Get-Content results\summary.log | Where-Object { $_ -match "^FAIL" } | Write-Host -ForegroundColor Red
            exit 1
          }

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-logs
          path: results/
